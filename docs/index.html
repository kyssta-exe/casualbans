<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CasualBans Documentation</title>
  <meta name="description" content="CasualBans — A modern, feature-rich cross-server punishment management system for Paper 1.21+.">
  <!-- docsify -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  <style>
    :root {
      --theme-color: #8c75a5;
    }
    body { background: #0d1117; }
    .sidebar {
      background: #0d1117 !important;
      border-right: 1px solid #21262d !important;
    }
    .sidebar ul li a { color: #c9d1d9 !important; }
    .sidebar ul li a:hover { color: #f46c90 !important; }
    .sidebar ul li.active > a {
      color: #f46c90 !important;
      border-right: 2px solid #f46c90;
    }
    .sidebar-toggle { background: #0d1117; }
    .content { background: #0d1117; }
    .markdown-section h1 { color: #f46c90; border-bottom: 1px solid #21262d; padding-bottom: 0.3em; }
    .markdown-section h2 { color: #8c75a5; }
    .markdown-section h3 { color: #c9d1d9; }
    .markdown-section a { color: #8c75a5; }
    .markdown-section a:hover { color: #f46c90; }
    .markdown-section code { background: #161b22; color: #f46c90; border-radius: 4px; padding: 2px 6px; }
    .markdown-section pre { background: #161b22; border: 1px solid #30363d; border-radius: 8px; }
    .markdown-section pre code { color: #c9d1d9; background: none; }
    .markdown-section blockquote { border-left: 4px solid #8c75a5; color: #8b949e; background: #161b22; padding: 0.5em 1em; }
    .markdown-section table { border-collapse: collapse; }
    .markdown-section th { background: #161b22; border: 1px solid #30363d; color: #8b949e; }
    .markdown-section td { border: 1px solid #30363d; }
    .markdown-section tr:nth-child(2n) { background: #0d1117; }
    .cover { background: #0d1117 !important; }
    .cover-main { color: #c9d1d9 !important; }
    .cover-main h1 span { color: #f46c90; }
    .cover-main a { border-color: #8c75a5 !important; color: #c9d1d9 !important; }
    .cover-main a:hover { background: #8c75a5 !important; color: #fff !important; }
    .app-nav { background: #0d1117; border-bottom: 1px solid #21262d; }
    .search { border: 1px solid #30363d; background: #161b22; }
    .search input { background: #161b22; color: #c9d1d9; }
    .pagination-item { border-color: #30363d !important; }
    .pagination-item:hover { border-color: #8c75a5 !important; }
    hr { border-color: #30363d; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'CasualBans',
      repo: 'https://github.com/kyssta-exe/casualbans',
      basePath: '/casualbans/',
      loadSidebar: true,
      loadNavbar: false,
      coverpage: true,
      auto2top: true,
      maxLevel: 4,
      subMaxLevel: 3,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search docs...',
        noData: 'No results found',
        depth: 4,
        hideOtherSidebarContent: false
      },
      plugins: [
        function(hook, vm) {
          hook.afterEach(function(html) {
            return html
              .replace(/\[BADGE_PAPER\]/g, '<span style="display:inline-block;padding:0.25em 0.6em;font-size:85%;font-weight:600;border-radius:4px;background:#2d1b3e;border:1px solid #8c75a5;color:#c9d1d9;margin:0 0.2em">Paper 1.21-26.1.2</span>')
              .replace(/\[BADGE_FOLIA\]/g, '<span style="display:inline-block;padding:0.25em 0.6em;font-size:85%;font-weight:600;border-radius:4px;background:#1b2d3e;border:1px solid #468ac9;color:#c9d1d9;margin:0 0.2em">Folia</span>')
              .replace(/\[BADGE_JAVA\]/g, '<span style="display:inline-block;padding:0.25em 0.6em;font-size:85%;font-weight:600;border-radius:4px;background:#1b3e2d;border:1px solid #46c98a;color:#c9d1d9;margin:0 0.2em">Java 21</span>')
              .replace(/\[BADGE_MIT\]/g, '<span style="display:inline-block;padding:0.25em 0.6em;font-size:85%;font-weight:600;border-radius:4px;background:#3e2d1b;border:1px solid #c98a46;color:#c9d1d9;margin:0 0.2em">MIT</span>');
          });
        }
      ]
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
</body>
</html>
